<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{LB-TYPE}}</title>
    <link rel='shortcut icon' type='image/x-icon' href='https://itsinhaleyo.online/images/favicon.ico'>
    <link rel="apple-touch-icon" sizes="180x180" href="https://itsinhaleyo.online/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://itsinhaleyo.online/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://itsinhaleyo.online/images/favicon-16x16.png">
    <link rel="manifest" href="https://itsinhaleyo.online/site.webmanifest">
    <link rel="stylesheet" href="https://itsinhaleyo.online/css/header.css">
    <link rel="stylesheet" href="https://itsinhaleyo.online/css/leaderboard.css">
</head>
<body>
    <header class="main-header">
        <div class="nav-container">
            <a href="/" class="logo">
                <img src="https://cdn.discordapp.com/avatars/1479879290270126263/baa2dc5e6d19d064dba7d62c5a6b0a4f.png" class="nav-logo">
                Jew
            </a>
            <nav class="nav-links">
                <div class = "casino">
                    <a href="/casino">Casino</a>
                </div>
                <div class="dropdown">
                    <button class="dropbtn">Crypto ▾</button>
                    <div class="dropdown-content">
                        <a href="/portfolio">💰 Portfolio</a>
                        <a href="/trading">📈 Trade Assets</a>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="dropbtn">Leaderboards ▾</button>
                    <div class="dropdown-content">
                        <a href="/leaderboard/money">💰 Money</a>
                        <a href="/leaderboard/rank">⭐ Rank</a>
                    </div>
                </div>
                <a href="/profile">
                    <img src="{{avatarurl}}" class="nav-user-avatar">
                </a>
            </nav>
        </div>
    </header>
    <div class="leaderboard-container">
        <h1>{{LB-TYPE}}</h1>
        <table>
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>User</th>
                    <th>Balance</th>
                    <th>Level</th>
                </tr>
            </thead>
            <tbody>
                {{rows}}
            </tbody>
        </table>
        <form action="" method="GET" style="margin-bottom: 20px; display: flex; gap: 10px;">
            <input type="text" name="search" placeholder="Search by username..." 
                style="flex-grow: 1; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15,23,42,0.5); color: white;">
            <button type="submit" style="padding: 10px 20px; background: #5865F2; color: white; border: none; border-radius: 8px; cursor: pointer;">Search</button>
            <a href="" style="padding: 10px; color: #94a3b8; text-decoration: none; font-size: 0.8rem; align-self: center;">Clear</a>
        </form>
        <a href="/" class="btn-back">← Back to Dashboard</a>
    </div>
</body>
</html>
