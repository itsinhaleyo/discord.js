<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Trading | {{share}}</title>
    <style>
        :root { --discord-blue: #5865F2; --bg-dark: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); --text-main: #f8fafc; --text-muted: #94a3b8; }
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle at top right, #1e293b, var(--bg-dark)); color: var(--text-main); margin: 0; padding-top: 100px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;}

        .main-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .nav-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropbtn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            padding: 0;
            transition: color 0.2s;
        }

        .dropdown:hover .dropbtn {
            color: #5865F2;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background: #1e293b;
            min-width: 180px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5);
            z-index: 10;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            top: 100%; 
            margin-top: 0; 
        }

        .dropdown::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 20px;
            bottom: -20px;
            left: 0;
        }

        .dropdown-content a {
            color: #94a3b8;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 0.85rem;
            transition: background 0.2s, color 0.2s;
        }

        .dropdown-content a:hover {
            background-color: rgba(88, 101, 242, 0.1);
            color: #5865F2;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: bold;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo {
            height: 40px;
            width: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s ease;
            box-shadow: 0 0 10px rgba(88, 101, 242, 0.2);
        }

        .nav-logo:hover {
            transform: scale(1.1);
            border-color: var(--discord-blue);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav-item {
            text-decoration: none;
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-item:hover {
            color: #5865F2;
        }

        .nav-user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: border-color 0.2s, transform 0.2s;
            display: block;
        }

        .nav-user-avatar:hover {
            border-color: #5865F2;
            transform: scale(1.1);
        }

        .nav-links a {
            text-decoration: none;
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
        }

        .nav-links a:hover {
            color: #5865F2;
        }

        .trading-layout {
            display: flex;
            gap: 20px;
            width: 95%;
            max-width: 1400px;
            margin: 0 auto;
            padding-bottom: 50px;
        }

        .chart-container {
            flex: 3;
            display: flex;
            flex-direction: column;
        }

        .chart-wrapper {
            height: 600px;
            padding: 0 !important;
            overflow: hidden;
        }

        .chart-wrapper iframe {
            width: 100%;
            height: 100%;
        }

        .sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-top: 58px;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 1.5rem;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            text-align: left;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: left;
        }

        .trade-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px;
            border-radius: 8px;
            width: 90%;
            margin-top: 10px;
            outline: none;
        }

        .trade-input:focus {
            border-color: var(--discord-blue);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-buy { background: #10b981; border: none; color: white; padding: 12px; border-radius: 8px; flex: 1; cursor: pointer; font-weight: bold; }
        .btn-sell { background: #ef4444; border: none; color: white; padding: 12px; border-radius: 8px; flex: 1; cursor: pointer; font-weight: bold; }

        @media (max-width: 1000px) {
            .trading-layout { flex-direction: column; }
            .sidebar { padding-top: 0; }
        }

        .btn-discord { border: none; color: white; padding: 12px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: transform 0.2s, opacity 0.2s; }
        .btn-discord:hover { transform: translateY(-2px); opacity: 0.9; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="nav-container">
            <a href="/" class="logo">
                <img src="https://cdn.discordapp.com/avatars/1479879290270126263/baa2dc5e6d19d064dba7d62c5a6b0a4f.png" class="nav-logo">
                Jew
            </a>
            <nav class="nav-links">
                <div class="dropdown">
                    <button class="dropbtn">Crypto ▾</button>
                    <div class="dropdown-content">
                        <a href="/portfolio">💰 Portfolio</a>
                        <a href="/trading">📈 Trade Assets</a>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="dropbtn">Leaderboards ▾</button>
                    <div class="dropdown-content">
                        <a href="/leaderboard/money">💰 Money</a>
                        <a href="/leaderboard/rank">⭐ Rank</a>
                    </div>
                </div>
                <a href="/profile">
                    <img src="{{avatarurl}}" class="nav-user-avatar">
                </a>
            </nav>
        </div>
    </header>
    <div class="trading-layout">
        <div class="chart-container">
            <div class="stat-card chart-wrapper">
                <iframe
                    id="geckoterminal-embed"
                    title="GeckoTerminal Embed"
                    src="{{contractlink}}?embed=1&info=0&swaps=0&light_chart=0&chart_type=price&resolution=1s&bg_color=111827" frameborder="0"
                    allow="clipboard-write"
                    allowfullscreen
                    style="width: 100%; height: 100%;">
                </iframe>
            </div>
        </div>
        <input type="hidden" id="network" value="{{network}}">
        <input type="hidden" id="contract" value="{{contract}}">
        <input type="hidden" id="coinid" value="{{share}}">
        <div class="sidebar">
            <div class="stat-card">
                <div class="stat-label">Your Holdings</div>
                <div class="stat-value">{{ownedshares}} <small style="font-size: 0.6em; color: var(--text-muted);">{{share}}</small></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Balance</div>
                <div class="stat-value">💰 {{balance}}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Market Order</div>
                <input id="amount" placeholder="Amount" class="trade-input">
                <div class="btn-group">
                    <button onclick="trade('buy')" class="btn-buy">Buy</button>
                    <button onclick="trade('sell')" class="btn-sell">Sell</button>
                </div>
                <p id="trade-status" style="margin-top: 10px; font-size: 0.8rem;"></p>
            </div>
        </div>
    </div>
<script>
    async function trade(action) {
        const network = document.getElementById('network').value;
        const coinid = document.getElementById('coinid').value;
        const contract = document.getElementById('contract').value;
        const amount = document.getElementById('amount').value;
        const status = document.getElementById('trade-status');
        if(!amount || amount <= 0) return alert("Please enter a valid amount");
        status.innerText = "⏳ Processing transaction...";
        status.style.color = "var(--text-muted)";
        try {
            const response = await fetch(`/trade/${action}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ coinId: coinid, network: network, contract: contract, amount: parseFloat(amount) })
            });
            const result = await response.json();
            if (result.success) {
                status.style.color = "#10b981";
                status.innerText = `✅ ${result.message}`;
                setTimeout(() => location.reload(), 2000);
            } else {
                status.style.color = "#ef4444";
                status.innerText = `❌ ${result.message}`;
            }
        } catch (err) {
            status.innerText = "❌ Connection error.";
        }
    }
</script>
</body>
</html>
