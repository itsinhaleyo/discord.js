<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Trading | {{share}}</title>
    <link rel='shortcut icon' type='image/x-icon' href='/images/favicon.ico'>
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="https://itsinhaleyo.online/css/header.css">
    <style>
        :root { 
            --discord-blue: #5865F2; 
            --bg-dark: #0f172a; 
            --card-bg: rgba(30, 41, 59, 0.7); 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
            --up-green: #10b981;
            --down-red: #ef4444;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, var(--bg-dark)); 
            color: var(--text-main); 
            margin: 0; 
            padding-top: 90px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }
        .trading-layout {
            display: flex;
            gap: 20px;
            width: 95%;
            max-width: 1400px;
            margin: 0 auto;
            padding-bottom: 20px;
            align-items: flex-start;
        }
        .chart-container {
            flex: 3;
            min-width: 0;
        }
        .sidebar {
            flex: 1;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 1.5rem;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        .chart-wrapper {
            height: 600px;
            padding: 0 !important;
            overflow: hidden;
        }
        .stat-label { color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 0.5rem; }
        .stat-value { font-size: 1.5rem; font-weight: 700; }
        .trade-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px;
            border-radius: 8px;
            width: calc(100% - 26px);
            margin-top: 10px;
            outline: none;
        }
        .leverage-container { margin-top: 15px; padding: 12px; background: rgba(255, 255, 255, 0.05); border-radius: 8px; }
        .leverage-header { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; }
        .leverage-slider { width: 100%; accent-color: var(--discord-blue); cursor: pointer; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-buy { background: var(--up-green); border: none; color: white; padding: 12px; border-radius: 8px; flex: 1; cursor: pointer; font-weight: bold; }
        .btn-sell { background: var(--down-red); border: none; color: white; padding: 12px; border-radius: 8px; flex: 1; cursor: pointer; font-weight: bold; }
        .orders-container {
            width: 95%;
            max-width: 1400px;
            margin: 20px auto 50px auto;
        }
        .orders-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            text-align: left;
        }
        .orders-table th {
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .orders-table td {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .btn-close-pos {
            background: rgba(239, 68, 68, 0.1);
            color: var(--down-red);
            border: 1px solid var(--down-red);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-close-pos:hover { background: var(--down-red); color: white; }
        @media (max-width: 1000px) {
            .trading-layout { flex-direction: column; }
            .sidebar { width: 100%; min-width: 100%; }
            .chart-wrapper { height: 400px; }
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="nav-container">
            <a href="/" class="logo">
                <img src="https://cdn.discordapp.com/avatars/1479879290270126263/baa2dc5e6d19d064dba7d62c5a6b0a4f.png" class="nav-logo">
                Jew
            </a>
            <nav class="nav-links">
                <div class="dropdown">
                    <button class="dropbtn">Crypto ▾</button>
                    <div class="dropdown-content">
                        <a href="/portfolio">💰 Portfolio</a>
                        <a href="/trading">📈 Trade Assets</a>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="dropbtn">Leaderboards ▾</button>
                    <div class="dropdown-content">
                        <a href="/leaderboard/money">💰 Money</a>
                        <a href="/leaderboard/rank">⭐ Rank</a>
                    </div>
                </div>
                <a href="/profile">
                    <img src="{{avatarurl}}" class="nav-user-avatar">
                </a>
            </nav>
        </div>
    </header>
    <div class="trading-layout">
        <div class="chart-container">
            <div class="stat-card chart-wrapper">
                <iframe id="geckoterminal-embed" title="GeckoTerminal Embed"
                    src="{{contractlink}}?embed=1&info=0&swaps=0&light_chart=0&chart_type=price&resolution=1s&bg_color=111827" 
                    frameborder="0" allow="clipboard-write" allowfullscreen style="width: 100%; height: 100%;">
                </iframe>
            </div>
        </div>
        <input type="hidden" id="network" value="{{network}}">
        <input type="hidden" id="contract" value="{{contract}}">
        <input type="hidden" id="coinid" value="{{share}}">
        <input type="hidden" id="price" value="{{price}}">
        <input type="hidden" id="display-shares" value="{{ownedshares}}">
        <input type="hidden" id="live-value">
        <div class="sidebar">
            <div class="stat-card">
                <div class="stat-label">Balance</div>
                <div id="balance" class="stat-value">💰 {{balance}}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Market Order</div>
                <input id="amount" type="number" placeholder="Amount" class="trade-input">
                <div class="leverage-container">
                    <div class="leverage-header">
                        <span>Leverage</span>
                        <span id="lev-display">1x (Spot)</span>
                    </div>
                    <input type="range" id="leverage" class="leverage-slider" min="1" max="100" value="1" 
                        oninput="document.getElementById('lev-display').innerText = this.value + 'x'">
                </div>
                <div class="btn-group">
                    <button onclick="trade('LONG')" class="btn-buy">Long</button>
                    <button onclick="trade('SHORT')" class="btn-sell">Short</button>
                </div>
                <p id="trade-status" style="margin-top: 10px; font-size: 0.8rem;"></p>
            </div>
        </div>
    </div>
    <div class="orders-container" style="width: 95%; max-width: 1400px; margin: 20px auto; background: var(--card-bg); border-radius: 18px; border: 1px solid rgba(255, 255, 255, 0.1); overflow: hidden;">
        <div style="padding: 1rem 1.5rem; border-bottom: 1px solid rgba(255, 255, 255, 0.1); font-weight: 600; color: var(--text-muted);">
            Open Positions
        </div>
        <table style="width: 100%; border-collapse: collapse; font-size: 0.85rem; text-align: left;">
            <thead style="background: rgba(0,0,0,0.2); color: var(--text-muted);">
                <tr>
                    <th style="padding: 12px 20px;">Symbol</th>
                    <th>Size</th>
                    <th>Entry Price</th>
                    <th>Leverage</th>
                    <th>PnL</th>
                    <th style="text-align: right; padding-right: 20px;">Action</th>
                </tr>
            </thead>
            <tbody>
                {{positionRows}}
            </tbody>
        </table>
    </div>
<script>
    async function closePosition(symbol, network, contract, totalShares) {
        if (!confirm(`Close your entire ${symbol} position?`)) return;
        const status = document.getElementById('trade-status');
        status.innerText = "⏳ Closing position...";
        status.style.color = "var(--text-muted)";
        status.scrollIntoView({ behavior: 'smooth', block: 'center' });
        try {
            const response = await fetch(`/trade/sell`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    coinId: symbol,
                    network: network,
                    contract: contract,
                    amount: totalShares,
                    leverage: leverage
                })
            });
            const result = await response.json();
            if (result.success) {
                status.style.color = "#10b981";
                status.innerText = `✅ ${result.message}`;
                setTimeout(() => location.reload(), 1500);
            } else {
                status.style.color = "#ef4444";
                status.innerText = `❌ ${result.message}`;
            }
        } catch (err) {
            console.error("Close Error:", err);
            status.innerText = "❌ Connection error.";
        }
    }
    async function trade(side) {
        const network = document.getElementById('network').value;
        const coinid = document.getElementById('coinid').value;
        const contract = document.getElementById('contract').value;
        const amount = document.getElementById('amount').value;
        const leverage = parseInt(document.getElementById('leverage').value) || 1;
        const status = document.getElementById('trade-status');
        if(!amount || amount <= 0) return alert("Please enter a valid amount");
        status.innerText = `⏳ Opening ${side}...`;
        try {
            const response = await fetch(`/trade/buy`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    coinId: coinid, network, contract, 
                    amount: parseFloat(amount), leverage, side 
                })
            });
            const result = await response.json();
            if (result.success) {
                status.style.color = "#10b981";
                status.innerText = `✅ ${result.message}`;
                setTimeout(() => location.reload(), 1500);
            } else {
                status.style.color = "#ef4444";
                status.innerText = `❌ ${result.message}`;
            }
        } catch (err) { status.innerText = "❌ Connection error."; }
    }
    async function updateLivePrice() {
        const network = document.getElementById('network').value;
        const contract = document.getElementById('contract').value;
        const ownedShares = document.getElementById('display-shares').value;
        const userid = document.getElementById('userid') ? document.getElementById('userid').value : null;
        const valueDisplay = document.getElementById('live-value');
        try {
            const response = await fetch(`/callback/update/${network}/${contract}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            const data = await response.json();
            const price = data.Price, balance = data.Balance, leverage = data.Leverage, marginused = Number(data.Margin_used);
            if (balance !== undefined) { document.getElementById('balance').innerText = `💰 ${balance.toLocaleString()}`; }
            if (price && !isNaN(ownedShares) && !isNaN(marginused)) {
                const currentTotalValue = price * ownedShares;
                const totalEntryCost = marginused * ownedShares;
                const pnl = currentTotalValue - totalEntryCost;
                const pnlPercent = ((pnl / marginused) * 100).toFixed(2);
                const pnlElement = document.getElementById('live-value');
                valueDisplay.innerText = `PnL: ${Math.round(pnl.toLocaleString())} (${pnlPercent}%)`;
                valueDisplay.style.color = pnl >= 0 ? '#00ff00' : '#ff0000';
                window.currentMarketPrice = price;
            }
            updatePositionsPnL(price);
        } catch (err) {
            console.error("Price update failed:", err);
            valueDisplay.innerText = "💰 Price Sync Error";
        }
    }
    function updatePositionsPnL(currentPrice) {
        const rows = document.querySelectorAll('.position-row');
        const marketPrice = window.currentMarketPrice;
        if (!marketPrice) return;
        rows.forEach(row => {
            const entry = parseFloat(row.dataset.entry);
            const shares = parseFloat(row.dataset.shares);
            const margin = parseFloat(row.dataset.margin);
            const side = row.dataset.side;
            const pnlCell = row.querySelector('.pos-pnl');
            const pnl = (side === 'SHORT') ? (entry - currentPrice) * shares : (currentPrice - entry) * shares;
            const pnlPercent = ((pnl / margin) * 100).toFixed(2);
            const color = pnl >= 0 ? '#10b981' : '#ef4444';
            const sign = pnl >= 0 ? '+' : '';
            pnlCell.innerHTML = `<span style="color: ${color}">${sign}$${Math.round(pnl).toLocaleString()} (${sign}${pnlPercent}%)</span>`;
        });
    }
    updateLivePrice();
    setInterval(() => { updateLivePrice(); }, 10000);
</script>
</body>
</html>
