<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leaderboard</title>
        <style>
        :root {
            --discord-blue: #5865F2;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        .main-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .nav-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropbtn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            padding: 0;
            transition: color 0.2s;
        }

        .dropdown:hover .dropbtn {
            color: #5865F2;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background: #1e293b;
            min-width: 180px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5);
            z-index: 10;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            top: 100%; 
            margin-top: 0; 
        }

        .dropdown::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 20px;
            bottom: -20px;
            left: 0;
        }

        .dropdown-content a {
            color: #94a3b8;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 0.85rem;
            transition: background 0.2s, color 0.2s;
        }

        .dropdown-content a:hover {
            background-color: rgba(88, 101, 242, 0.1);
            color: #5865F2;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: bold;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo {
            height: 40px;
            width: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s ease;
            box-shadow: 0 0 10px rgba(88, 101, 242, 0.2);
        }

        .nav-logo:hover {
            transform: scale(1.1);
            border-color: var(--discord-blue);
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }
        

        .nav-item {
            text-decoration: none;
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-item:hover {
            color: #5865F2;
        }

        .nav-user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: border-color 0.2s, transform 0.2s;
            display: block;
        }

        .nav-user-avatar:hover {
            border-color: #5865F2;
            transform: scale(1.1);
        }

        .nav-links a, .logout-link {
            text-decoration: none;
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
        }

        .nav-links a:hover, .logout-link:hover {
            color: #5865F2;
        }

        body {
            padding-top: 80px !important;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, var(--bg-dark));
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--discord-blue);
            margin-bottom: 1rem;
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.3);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            font-size: 0.8rem;
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.5);
            padding: 1rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: bold;
        }

        .btn-discord {
            display: block;
            background: var(--discord-blue);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            transition: transform 0.2s, background 0.2s;
            margin-bottom: 1rem;
        }

        .btn-discord:hover {
            background: #4752c4;
            transform: translateY(-2px);
        }

        .btn-logout {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: underline;
            transition: color 0.2s;
        }

        .btn-logout:hover {
            color: #ef4444;
        }

        .leaderboard-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 800px;
        }

        h1 { text-align: center; margin-bottom: 2rem; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
        }

        th {
            text-align: left;
            color: #94a3b8;
            font-size: 0.8rem;
            text-transform: uppercase;
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        th:nth-child(2) {
            padding-left: 56px;
        }

        td {
            padding: 15px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tr:hover { background: rgba(255, 255, 255, 0.02); }

        .btn-back {
            display: inline-block;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .btn-back:hover { color: var(--accent); }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="nav-container">
            <a href="/" class="logo">
                <img src="https://cdn.discordapp.com/avatars/1479879290270126263/baa2dc5e6d19d064dba7d62c5a6b0a4f.png" class="nav-logo">
                Jew
            </a>
            <nav class="nav-links">
                <div class="dropdown">
                    <button class="dropbtn">Leaderboards ▾</button>
                    <div class="dropdown-content">
                        <a href="/leaderboard/money">💰 Money Top</a>
                        <a href="/leaderboard/rank">⭐ Rank Top</a>
                    </div>
                </div>
                <form action="/logout" method="POST" style="display:inline;">
                    <button type="submit" class="logout-link">Logout</button>
                </form>
                <a href="/profile">
                    <img src="{{avatarurl}}" class="nav-user-avatar">
                </a>
            </nav>
        </div>
    </header>
    <div class="leaderboard-container">
        <h1>Global Leaderboard</h1>
        <table>
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>User</th>
                    <th>Balance</th>
                    <th>Level</th>
                </tr>
            </thead>
            <tbody>
                {{rows}}
            </tbody>
        </table>
        <form action="" method="GET" style="margin-bottom: 20px; display: flex; gap: 10px;">
            <input type="text" name="search" placeholder="Search by username..." 
                style="flex-grow: 1; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15,23,42,0.5); color: white;">
            <button type="submit" style="padding: 10px 20px; background: #5865F2; color: white; border: none; border-radius: 8px; cursor: pointer;">Search</button>
            <a href="" style="padding: 10px; color: #94a3b8; text-decoration: none; font-size: 0.8rem; align-self: center;">Clear</a>
        </form>
        <a href="/" class="btn-back">← Back to Dashboard</a>
    </div>
</body>
</html>
