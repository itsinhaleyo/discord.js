<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jew Bot | Home</title>
    <style>
        :root {
            --discord-blue: #5865F2;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        .main-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .nav-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropbtn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            padding: 0;
            transition: color 0.2s;
        }

        .dropdown:hover .dropbtn {
            color: #5865F2;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background: #1e293b;
            min-width: 180px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5);
            z-index: 10;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            top: 100%; 
            margin-top: 0; 
        }

        .dropdown::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 20px;
            bottom: -20px;
            left: 0;
        }

        .dropdown-content a {
            color: #94a3b8;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 0.85rem;
            transition: background 0.2s, color 0.2s;
        }

        .dropdown-content a:hover {
            background-color: rgba(88, 101, 242, 0.1);
            color: #5865F2;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: bold;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo {
            height: 40px;
            width: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s ease;
            box-shadow: 0 0 10px rgba(88, 101, 242, 0.2);
        }

        .nav-logo:hover {
            transform: scale(1.1);
            border-color: var(--discord-blue);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav-item {
            text-decoration: none;
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-item:hover {
            color: #5865F2;
        }

        .nav-user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: border-color 0.2s, transform 0.2s;
            display: block;
        }

        .nav-user-avatar:hover {
            border-color: #5865F2;
            transform: scale(1.1);
        }

        .nav-links a {
            text-decoration: none;
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
        }

        .nav-links a:hover {
            color: #5865F2;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, var(--bg-dark));
            color: var(--text-main);
            margin: 0;
            padding-top: 80px;
        }

        .cta-btn {
            display: inline-block;
            background: var(--discord-blue);
            color: white;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(88, 101, 242, 0.4);
        }

        .bot-stats {
            text-align: center;
            padding: 50px 20px;
            background: rgba(0,0,0,0.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin: 2rem auto;
            max-width: 500px;
            width: 100%;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 1.25rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .stat-card.full-width {
            grid-column: span 2;
            padding: 1rem 2rem;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="nav-container">
            <a href="/" class="logo">
                <img src="https://cdn.discordapp.com/avatars/1479879290270126263/baa2dc5e6d19d064dba7d62c5a6b0a4f.png" class="nav-logo">
                Jew
            </a>
            <nav class="nav-links">
                <div class="dropdown">
                    <button class="dropbtn">Leaderboards ▾</button>
                    <div class="dropdown-content">
                        <a href="/leaderboard/money">💰 Money</a>
                        <a href="/leaderboard/rank">⭐ Rank</a>
                    </div>
                </div>
                <a href="/profile">
                    <img src="{{avatarurl}}" class="nav-user-avatar">
                </a>
            </nav>
        </div>
    </header>
    <div class="dashboard-wrapper" style="max-width: 800px; margin: 0 auto; text-align: center;"></div>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Balance</div>
                <div class="stat-value">💰 {{balance}}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Level</div>
                <div class="stat-value">⭐ {{level}}</div>
            </div>
            <div class="stat-card full-width">
                <div class="stat-label">Daily Reward</div>
                <div id="daily-container">
                    <button onclick="claimDaily()" id="daily-btn" class="btn-discord" style="margin: 0; width: 100%;">
                        Claim Daily 💰 25,000
                    </button>
                    <div id="cooldown-timer" style="display: none; color: #94a3b8; font-size: 0.9rem; margin-top: 12px;">
                        Next reward in: <span id="timer-text" style="color: #fff; font-weight: bold;">--:--:--</span>
                    </div>
                </div>
            </div>
        </div>
        <script>
            let hasClaimed = {{hasClaimed}};
            let msLeft = {{msUntilMidnight}};
            function updateTimer() {
                if (msLeft <= 0) {
                    location.reload(); 
                    return;
                }
                const hours = Math.floor(msLeft / 3600000);
                const minutes = Math.floor((msLeft % 3600000) / 60000);
                const seconds = Math.floor((msLeft % 60000) / 1000);

                document.getElementById('timer-text').innerText = 
                    `${hours}h ${minutes}m ${seconds}s`;
                msLeft -= 1000;
            }
            if (hasClaimed) {
                const btn = document.getElementById('daily-btn');
                if(btn) {
                    btn.disabled = true;
                    btn.innerText = "✅ Claimed Today";
                    btn.style.background = "rgba(255,255,255,0.05)";
                    btn.style.color = "#94a3b8";
                    document.getElementById('cooldown-timer').style.display = "block";
                    setInterval(updateTimer, 1000);
                    updateTimer();
                }
            }
            async function claimDaily() {
                const btn = document.getElementById('daily-btn');
                btn.disabled = true;
                btn.innerText = "Processing...";
                try {
                    const response = await fetch('/claim-daily', { method: 'POST' });
                    const data = await response.json();
                    if (data.success) {
                        location.reload(); 
                    } else {
                        alert(data.message);
                        btn.disabled = false;
                        btn.innerText = "Claim Daily 💰 25,000";
                    }
                } catch (err) {
                    alert("Error connecting to server.");
                }
            }
        </script>
        <div class="bot-stats" style="margin-top: 3rem;">
        <div style="display: flex; justify-content: center; gap: 40px; margin-bottom: 1.5rem;">
            <div>
                <h2 style="margin:0; font-size: 1.5rem;">{{userCount}}</h2>
                <p style="color: var(--text-muted); font-size: 0.8rem;">Users</p>
            </div>
            <div>
                <h2 style="margin:0; font-size: 1.5rem;">{{serverCount}}</h2>
                <p style="color: var(--text-muted); font-size: 0.8rem;">Servers</p>
            </div>
        </div>
        <a href="https://discord.com/oauth2/authorize?client_id=1479879290270126263" class="cta-btn">Add Jew to Your Server</a>
    </div>
    </div>
</body>
</html>
