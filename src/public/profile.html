<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="https://itsinhaleyo.online/css/header.css">
    <style>
        :root {
            --discord-blue: #5865F2;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, var(--bg-dark));
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--discord-blue);
            margin-bottom: 1rem;
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.3);
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status-badge {
            font-size: 0.8rem;
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 2rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: rgba(15, 23, 42, 0.5);
            padding: 1rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stat-label {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        .stat-value {
            font-size: 1.25rem;
            font-weight: bold;
        }
        .btn-discord {
            display: block;
            background: var(--discord-blue);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            transition: transform 0.2s, background 0.2s;
            margin-bottom: 1rem;
        }
        .btn-discord:hover {
            background: #4752c4;
            transform: translateY(-2px);
        }
        .btn-logout-special {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(220, 38, 38, 0.4));
            color: #fecaca;
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(4px);
        }
        .btn-logout-special:hover {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.4), rgba(220, 38, 38, 0.6));
            border-color: rgba(239, 68, 68, 0.6);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(239, 68, 68, 0.3);
        }
        .btn-logout-special:active {
            transform: translateY(0);
        }
        .btn-logout-special .icon {
            font-size: 1.1rem;
            filter: drop-shadow(0 0 5px rgba(239, 68, 68, 0.5));
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="nav-container">
            <a href="/" class="logo">
                <img src="https://cdn.discordapp.com/avatars/1479879290270126263/baa2dc5e6d19d064dba7d62c5a6b0a4f.png" class="nav-logo">
                Jew
            </a>
            <nav class="nav-links">
                <div class="dropdown">
                    <button class="dropbtn">Crypto ▾</button>
                    <div class="dropdown-content">
                        <a href="/portfolio">💰 Portfolio</a>
                        <a href="/trading">📈 Trade Assets</a>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="dropbtn">Leaderboards ▾</button>
                    <div class="dropdown-content">
                        <a href="/leaderboard/money">💰 Money</a>
                        <a href="/leaderboard/rank">⭐ Rank</a>
                    </div>
                </div>
                <a href="/profile">
                    <img src="{{avatarurl}}" class="nav-user-avatar">
                </a>
            </nav>
        </div>
    </header>
    <div class="container">
        <img src="{{avatarurl}}" class="avatar">
        <h1>Welcome, User</h1>
        <div class="status-badge">● Secure via Cloudflare</div>
        <div id="discord-section">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Balance</div>
                    <div class="stat-value">💰 {{balance}}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Level</div>
                    <div class="stat-value">⭐ {{level}}</div>
                </div>
            </div>
        </div>
        <div class="logout-section" style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.05);">
            <form action="/logout" method="POST">
                <button type="submit" class="btn-logout-special">
                    <span class="icon">🚀</span> Sign Out of Session
                </button>
            </form>
            <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 1rem;">
                Securely ends your session on this device.
            </p>
        </div>
    </div>
</body>
</html>
