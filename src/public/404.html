<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - Page Not Found</title>
    <style>
        :root {
            --discord-blue: #5865F2;
            --bg-dark: #0f172a;
            --text-main: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, var(--bg-dark));
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(to bottom, #fff, var(--discord-blue));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        h2 { font-size: 1.5rem; margin: 10px 0 30px; color: #94a3b8; }

        .btn-home {
            background: var(--discord-blue);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .btn-home:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.4);
        }

        .status-badge {
            font-size: 0.8rem;
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 2rem;
        }

        .main-content-wrapper {
            flex: 1; 
        }

        footer {
            padding: 2rem 0;
            text-align: center;
            width: 100%;
        }

        .main-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .nav-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropbtn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            padding: 0;
            transition: color 0.2s;
        }

        .dropdown:hover .dropbtn {
            color: #5865F2;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background: #1e293b;
            min-width: 180px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5);
            z-index: 10;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            top: 100%; 
            margin-top: 0; 
        }

        .dropdown::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 20px;
            bottom: -20px;
            left: 0;
        }

        .dropdown-content a {
            color: #94a3b8;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 0.85rem;
            transition: background 0.2s, color 0.2s;
        }

        .dropdown-content a:hover {
            background-color: rgba(88, 101, 242, 0.1);
            color: #5865F2;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: bold;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo {
            height: 40px;
            width: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s ease;
            box-shadow: 0 0 10px rgba(88, 101, 242, 0.2);
        }

        .nav-logo:hover {
            transform: scale(1.1);
            border-color: var(--discord-blue);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav-item {
            text-decoration: none;
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-item:hover {
            color: #5865F2;
        }

        .nav-user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: border-color 0.2s, transform 0.2s;
            display: block;
        }

        .nav-user-avatar:hover {
            border-color: #5865F2;
            transform: scale(1.1);
        }

        .nav-links a {
            text-decoration: none;
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
        }

        .nav-links a:hover {
            color: #5865F2;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="nav-container">
            <a href="/" class="logo">
                <img src="https://cdn.discordapp.com/avatars/1479879290270126263/baa2dc5e6d19d064dba7d62c5a6b0a4f.png" class="nav-logo">
                Jew
            </a>
            <nav class="nav-links">
                <div class = "casino">
                    <a href="/casino">Casino</a>
                </div>
                <div class="dropdown">
                    <button class="dropbtn">Crypto ▾</button>
                    <div class="dropdown-content">
                        <a href="/portfolio">💰 Portfolio</a>
                        <a href="/trading">📈 Trade Assets</a>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="dropbtn">Leaderboards ▾</button>
                    <div class="dropdown-content">
                        <a href="/leaderboard/money">💰 Money</a>
                        <a href="/leaderboard/rank">⭐ Rank</a>
                    </div>
                </div>
                <a href="/profile">
                    <img src="https://itsinhaleyo.online/images/imageplaceholder.png" class="nav-user-avatar">
                </a>
            </nav>
        </div>
    </header>
    <p class="error-code">404</p>
    <h2>Oops! This page doesn't exist.</h2>
    <a href="/" class="btn-home">Home Page</a>
    <footer style="margin-top: 4rem; padding-bottom: 2rem; text-align: center; width: 100%;">
        <div class="status-badge">● Secure via Cloudflare</div>
    </footer>
</body>
</html>
