<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Portfolio</title>
    <link rel='shortcut icon' type='image/x-icon' href='/images/favicon.ico'>
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="https://itsinhaleyo.online/css/header.css">
    <style>
        :root { --discord-blue: #5865F2; --bg-dark: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); --text-main: #f8fafc; --text-muted: #94a3b8; }
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle at top right, #1e293b, var(--bg-dark)); color: var(--text-main); margin: 0; padding-top: 100px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { background: var(--card-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 2rem; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); width: 90%; max-width: 800px; text-align: center; }
        .portfolio-header { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .p-stat { background: rgba(15, 23, 42, 0.5); padding: 1rem; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .p-label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; }
        .p-value { font-size: 1.1rem; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { text-align: left; color: var(--text-muted); font-size: 0.8rem; padding: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        td { padding: 15px 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); text-align: left; }
        .up { color: #10b981; } .down { color: #ef4444; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="nav-container">
            <a href="/" class="logo">
                <img src="https://cdn.discordapp.com/avatars/1479879290270126263/baa2dc5e6d19d064dba7d62c5a6b0a4f.png" class="nav-logo">
                Jew
            </a>
            <nav class="nav-links">
                <div class = "casino">
                    <a href="/casino">Casino</a>
                </div>
                <div class="dropdown">
                    <button class="dropbtn">Crypto ▾</button>
                    <div class="dropdown-content">
                        <a href="/portfolio">💰 Portfolio</a>
                        <a href="/trading">📈 Trade Assets</a>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="dropbtn">Leaderboards ▾</button>
                    <div class="dropdown-content">
                        <a href="/leaderboard/money">💰 Money</a>
                        <a href="/leaderboard/rank">⭐ Rank</a>
                    </div>
                </div>
                <a href="/profile">
                    <img src="{{avatarurl}}" class="nav-user-avatar">
                </a>
            </nav>
        </div>
    </header>
    <div class="container">
        <h1>Your Portfolio</h1>
        <div class="portfolio-header">
            <div class="p-stat"><div class="p-label">Cash</div><div class="p-value" id="top-cash">💰 {{cash}}</div></div>
            <div class="p-stat"><div class="p-label">Assets</div><div class="p-value" id="top-assets">📊 {{assetValue}}</div></div>
            <div class="p-stat"><div class="p-label">Total P/L</div><div class="p-value" id="top-pnl">{{totalPnl}}</div></div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Asset</th>
                    <th>Shares</th>
                    <th>Profit/Loss</th>
                </tr>
            </thead>
            <tbody>
                {{rows}}
            </tbody>
        </table>
    </div>
<script>
    async function updateAllPrices() {
        const rows = document.querySelectorAll('.portfolio-row');
        const cashDisplay = document.getElementById('top-cash');
        const assetsDisplay = document.getElementById('top-assets');
        const totalPnlDisplay = document.getElementById('top-pnl');
        let totalCurrentValue = 0;
        let totalInitialCost = 0;
        for (const row of rows) {
            const network = row.dataset.network;
            const contract = row.dataset.contract;
            const shares = parseFloat(row.dataset.shares);
            const entryPrice = parseFloat(row.dataset.entry);
            const marginUsed = parseFloat(row.dataset.margin);
            const side = row.dataset.side;
            const pnlCell = row.querySelector('.pnl-cell');
            const pnlPercentDiv = row.querySelector('.pnl-percent');
            try {
                const response = await fetch(`/callback/update/${network}/${contract}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                const currentPrice = data.Price;
                if (data.Balance !== undefined && cashDisplay) {
                    cashDisplay.innerText = `💰 ${Number(data.Balance).toLocaleString()}`;
                }
                if (currentPrice) {
                    let pnl;
                    if (side === 'SHORT') {
                        pnl = (entryPrice - currentPrice) * shares;
                    } else {
                        pnl = (currentPrice - entryPrice) * shares;
                    }
                    const pnlPercent = ((pnl / marginUsed) * 100).toFixed(2);
                    const sign = pnl >= 0 ? '+' : '';
                    const color = pnl >= 0 ? '#10b981' : '#ef4444';
                    totalCurrentValue += (marginUsed + pnl);
                    totalInitialCost += marginUsed;
                    if (pnlCell && pnlPercentDiv) {
                        pnlCell.style.color = color;
                        pnlCell.firstChild.textContent = `${sign}💰${Math.round(pnl).toLocaleString()} `;
                        pnlPercentDiv.innerText = `(${sign}${pnlPercent}%)`;
                    }
                }
            } catch (err) { console.error(`Update failed for ${contract}:`, err);  }
        }
        if (assetsDisplay) { assetsDisplay.innerText = `📊 ${Math.round(totalCurrentValue).toLocaleString()}`; }
        if (totalPnlDisplay && totalInitialCost > 0) {
            const totalPnl = totalCurrentValue - totalInitialCost;
            const totalPnlPercent = ((totalPnl / totalInitialCost) * 100).toFixed(2);
            const totalSign = totalPnl >= 0 ? '+' : '';
            const totalColor = totalPnl >= 0 ? '#10b981' : '#ef4444';
            totalPnlDisplay.innerHTML = `<span style="color: ${totalColor}">${totalSign}${Math.round(totalPnl).toLocaleString()} (${totalSign}${totalPnlPercent}%)</span>`;
        }
    }
    updateAllPrices();
    setInterval(updateAllPrices, 10000);
</script>
</body>
</html>
