<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Phaser Slot Machine</title>
    <script src="https://itsinhaleyo.online/phaser.min.js"></script>
</head>
<body>
    <script>
        const config = {
            type: Phaser.CANVAS,
            width: 800,
            height: 600,
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let reel;
        let isSpinning = false;

        function preload() {
            this.load.image('reelStrip', 'https://itsinhaleyo.online/images/symbols_strip.png');
        }

        function create() {
            // 1. Create the reel using a TileSprite
            // Parameters: x, y, width, height, key
            reel = this.add.tileSprite(400, 300, 150, 450, 'reelStrip');

            // 2. Add a spin button
            const spinButton = this.add.text(400, 550, 'SPIN', { fill: '#0f0' })
                .setInteractive()
                .on('pointerdown', () => startSpin());
        }

        function startSpin() {
            if (isSpinning) return;
            isSpinning = true;

            // 1. Define how many symbols are in your strip
            const symbolCount = 10; 
            const symbolHeight = 150; // The height of one individual symbol in pixels

            // 2. Pick a random winning symbol (0 to 9)
            const stopIndex = Phaser.Math.Between(0, symbolCount - 1);
            
            // 3. Calculate exactly where the strip needs to stop
            // We add extra "full spins" (symbolHeight * symbolCount * 5) so it looks like it's spinning fast
            const targetY = (stopIndex * symbolHeight) + (symbolHeight * symbolCount * 5);

            // 4. Use a Tween to animate the reel stopping
            this.tweens.add({
                targets: reel,
                tilePositionY: reel.tilePositionY + targetY,
                duration: 3000, // Spin for 3 seconds
                ease: 'Back.easeOut', // Gives it that professional "bounce" at the end
                onComplete: () => {
                    isSpinning = false;
                    console.log("Stopped on symbol index: " + stopIndex);
                    // You can trigger your Win Logic here!
                }
            });
        }

        function update() {
            if (isSpinning) {
                // 3. Scroll the texture to simulate spinning
                reel.tilePositionY += 20; 
            }
        }
    </script>
</body>
</html>
